<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">TRACE RC3D workspace flow</title>
  <desc id="desc">Eight-step product model from Goal to Workspace, Capabilities, Apps, Memory, Timeline, Recommendations, and Execution.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#70e1a1"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#080a0f"/>
  <text x="800" y="84" text-anchor="middle" fill="#70e1a1" font-family="Arial, sans-serif" font-size="18" font-weight="700">TRACE RC3D WORKSPACE ENGINE</text>
  <text x="800" y="135" text-anchor="middle" fill="#f7f8fa" font-family="Arial, sans-serif" font-size="40" font-weight="700">From a Goal to Continuing Work</text>
  <text x="800" y="172" text-anchor="middle" fill="#9ba3b0" font-family="Arial, sans-serif" font-size="18">The workspace keeps product state stable while capabilities and providers remain replaceable.</text>

  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <rect x="95" y="250" width="300" height="150" rx="18" fill="#11151c" stroke="#355442"/>
    <text x="125" y="291" fill="#70e1a1" font-size="15" font-weight="700">01</text>
    <text x="125" y="335" fill="#f7f8fa" font-size="25" font-weight="700">Goal</text>
    <text x="125" y="369" fill="#9ba3b0" font-size="16">The outcome the user wants</text>

    <rect x="465" y="250" width="300" height="150" rx="18" fill="#11151c" stroke="#355442"/>
    <text x="495" y="291" fill="#70e1a1" font-size="15" font-weight="700">02</text>
    <text x="495" y="335" fill="#f7f8fa" font-size="25" font-weight="700">Workspace</text>
    <text x="495" y="369" fill="#9ba3b0" font-size="16">Account-owned durable context</text>

    <rect x="835" y="250" width="300" height="150" rx="18" fill="#11151c" stroke="#355442"/>
    <text x="865" y="291" fill="#70e1a1" font-size="15" font-weight="700">03</text>
    <text x="865" y="335" fill="#f7f8fa" font-size="25" font-weight="700">Capabilities</text>
    <text x="865" y="369" fill="#9ba3b0" font-size="16">Bounded operations required</text>

    <rect x="1205" y="250" width="300" height="150" rx="18" fill="#11151c" stroke="#355442"/>
    <text x="1235" y="291" fill="#70e1a1" font-size="15" font-weight="700">04</text>
    <text x="1235" y="335" fill="#f7f8fa" font-size="25" font-weight="700">Apps</text>
    <text x="1235" y="369" fill="#9ba3b0" font-size="16">Recognizable packages of work</text>

    <rect x="1205" y="540" width="300" height="150" rx="18" fill="#11151c" stroke="#3b4f6a"/>
    <text x="1235" y="581" fill="#63a9ff" font-size="15" font-weight="700">05</text>
    <text x="1235" y="625" fill="#f7f8fa" font-size="25" font-weight="700">Memory</text>
    <text x="1235" y="659" fill="#9ba3b0" font-size="16">Reusable workspace context</text>

    <rect x="835" y="540" width="300" height="150" rx="18" fill="#11151c" stroke="#3b4f6a"/>
    <text x="865" y="581" fill="#63a9ff" font-size="15" font-weight="700">06</text>
    <text x="865" y="625" fill="#f7f8fa" font-size="25" font-weight="700">Timeline</text>
    <text x="865" y="659" fill="#9ba3b0" font-size="16">Creation, progress, and results</text>

    <rect x="465" y="540" width="300" height="150" rx="18" fill="#11151c" stroke="#3b4f6a"/>
    <text x="495" y="581" fill="#63a9ff" font-size="15" font-weight="700">07</text>
    <text x="495" y="625" fill="#f7f8fa" font-size="25" font-weight="700">Recommendations</text>
    <text x="495" y="659" fill="#9ba3b0" font-size="16">The next safe action</text>

    <rect x="95" y="540" width="300" height="150" rx="18" fill="#11151c" stroke="#6a5531"/>
    <text x="125" y="581" fill="#f3b95f" font-size="15" font-weight="700">08</text>
    <text x="125" y="625" fill="#f7f8fa" font-size="25" font-weight="700">Execution</text>
    <text x="125" y="659" fill="#9ba3b0" font-size="16">Approved work advances the goal</text>
  </g>

  <g fill="none" stroke="#70e1a1" stroke-width="4" marker-end="url(#arrow)">
    <line x1="395" y1="325" x2="452" y2="325"/>
    <line x1="765" y1="325" x2="822" y2="325"/>
    <line x1="1135" y1="325" x2="1192" y2="325"/>
    <path d="M1355 400 L1355 527"/>
    <line x1="1205" y1="615" x2="1148" y2="615"/>
    <line x1="835" y1="615" x2="778" y2="615"/>
    <line x1="465" y1="615" x2="408" y2="615"/>
  </g>

  <path d="M245 690 C245 775 800 800 800 730" fill="none" stroke="#3d4959" stroke-width="3" stroke-dasharray="9 10"/>
  <text x="800" y="824" text-anchor="middle" fill="#9ba3b0" font-family="Arial, sans-serif" font-size="16">Execution returns results and context to the same workspace, allowing the work to continue.</text>
</svg>
