<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">TRACE public-safe deployment view</title>
  <desc id="desc">A public-safe view of product, workflow, integration, and continuity service roles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07100f"/><stop offset="1" stop-color="#0a1720"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#72e6b1"/></marker>
    <style>.title{font:700 48px Arial,sans-serif;fill:#f4fbf8}.sub{font:400 22px Arial,sans-serif;fill:#9fb3ac}.label{font:700 22px Arial,sans-serif;fill:#f4fbf8}.small{font:400 15px Arial,sans-serif;fill:#9fb3ac}.tag{font:700 15px Arial,sans-serif;fill:#72e6b1}.card{fill:#101d1a;stroke:#304b43;stroke-width:2}.boundary{fill:none;stroke:#35566b;stroke-width:2;stroke-dasharray:10 10}</style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="80" y="88" class="title">Public-Safe Deployment View</text><text x="80" y="130" class="sub">Service responsibilities without private hosts, endpoints, credentials, or topology</text>
  <rect x="64" y="174" width="1472" height="596" rx="8" class="boundary"/>
  <text x="92" y="208" class="tag">TRACE SYSTEM BOUNDARY</text>
  <g stroke="#72e6b1" stroke-width="3" fill="none" marker-end="url(#arrow)"><path d="M300 426H390"/><path d="M680 426H770"/><path d="M1060 426H1150"/></g>
  <rect x="100" y="330" width="200" height="190" rx="8" class="card"/><text x="130" y="378" class="tag">CLIENT</text><text x="130" y="416" class="label">Browser</text><text x="130" y="450" class="small">Chat, Workspace,</text><text x="130" y="474" class="small">Apps, Account</text>
  <rect x="390" y="300" width="290" height="250" rx="8" class="card"/><text x="425" y="348" class="tag">PRODUCT APPLICATION</text><text x="425" y="386" class="label">Web and API layer</text><text x="425" y="422" class="small">session and account boundary</text><text x="425" y="448" class="small">product surfaces</text><text x="425" y="474" class="small">request validation</text><text x="425" y="500" class="small">public response sanitization</text>
  <rect x="770" y="300" width="290" height="250" rx="8" class="card"/><text x="805" y="348" class="tag">WORKFLOW SERVICES</text><text x="805" y="386" class="label">Orchestration</text><text x="805" y="422" class="small">intent and task graphs</text><text x="805" y="448" class="small">App and access resolution</text><text x="805" y="474" class="small">approval boundaries</text><text x="805" y="500" class="small">bounded execution</text>
  <rect x="1150" y="300" width="286" height="250" rx="8" class="card"/><text x="1185" y="348" class="tag">ADAPTERS</text><text x="1185" y="386" class="label">Connected services</text><text x="1185" y="422" class="small">documents and data</text><text x="1185" y="448" class="small">research and markets</text><text x="1185" y="474" class="small">mail, chat, and projects</text><text x="1185" y="500" class="small">read-only wallet context</text>
  <path d="M915 550V630" stroke="#72e6b1" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <rect x="520" y="630" width="790" height="100" rx="8" class="card"/><text x="555" y="672" class="tag">DURABLE CONTINUITY</text><text x="555" y="704" class="label">Workspace state  ·  Memory  ·  Artifacts  ·  Execution history</text>
  <text x="80" y="828" class="small">The full private deployment topology is intentionally excluded from the public showcase.</text>
</svg>
