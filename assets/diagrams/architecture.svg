<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">TRACE architecture</title>
  <desc id="desc">Four-layer architecture connecting product surfaces, orchestration, apps and integrations, and continuity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07100f"/>
      <stop offset="1" stop-color="#0a1720"/>
    </linearGradient>
    <style>
      .title{font:700 44px Arial,sans-serif;fill:#f4fbf8}.sub{font:400 22px Arial,sans-serif;fill:#9fb3ac}
      .layer{font:700 18px Arial,sans-serif;fill:#72e6b1}.box{fill:#101d1a;stroke:#304b43;stroke-width:2}
      .box2{fill:#101b25;stroke:#36516a;stroke-width:2}.label{font:700 21px Arial,sans-serif;fill:#f4fbf8}
      .small{font:400 15px Arial,sans-serif;fill:#9fb3ac}.foot{font:400 17px Arial,sans-serif;fill:#8ca39b}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="80" y="82" class="title">TRACE Architecture</text>
  <text x="80" y="122" class="sub">AI adoption through four product surfaces and a reviewable execution path</text>

  <text x="80" y="206" class="layer">PRODUCT</text>
  <rect x="245" y="168" width="270" height="78" rx="8" class="box"/><text x="380" y="200" text-anchor="middle" class="label">Chat</text><text x="380" y="226" text-anchor="middle" class="small">goal, clarification, result</text>
  <rect x="535" y="168" width="270" height="78" rx="8" class="box"/><text x="670" y="200" text-anchor="middle" class="label">Workspace</text><text x="670" y="226" text-anchor="middle" class="small">tasks, artifacts, continuity</text>
  <rect x="825" y="168" width="270" height="78" rx="8" class="box"/><text x="960" y="200" text-anchor="middle" class="label">Apps</text><text x="960" y="226" text-anchor="middle" class="small">usable work capabilities</text>
  <rect x="1115" y="168" width="270" height="78" rx="8" class="box"/><text x="1250" y="200" text-anchor="middle" class="label">Account</text><text x="1250" y="226" text-anchor="middle" class="small">identity, access, connections</text>

  <text x="80" y="354" class="layer">ORCHESTRATION</text>
  <rect x="245" y="316" width="270" height="78" rx="8" class="box2"/><text x="380" y="348" text-anchor="middle" class="label">Understand intent</text><text x="380" y="374" text-anchor="middle" class="small">goal and required context</text>
  <rect x="535" y="316" width="270" height="78" rx="8" class="box2"/><text x="670" y="348" text-anchor="middle" class="label">Plan workflow</text><text x="670" y="374" text-anchor="middle" class="small">bounded task graph</text>
  <rect x="825" y="316" width="270" height="78" rx="8" class="box2"/><text x="960" y="348" text-anchor="middle" class="label">Resolve access</text><text x="960" y="374" text-anchor="middle" class="small">App, connection, permission</text>
  <rect x="1115" y="316" width="270" height="78" rx="8" class="box2"/><text x="1250" y="348" text-anchor="middle" class="label">Approve or block</text><text x="1250" y="374" text-anchor="middle" class="small">human decision boundary</text>

  <text x="80" y="502" class="layer">APPS &amp; DATA</text>
  <rect x="245" y="464" width="216" height="78" rx="8" class="box"/><text x="353" y="496" text-anchor="middle" class="label">Documents</text><text x="353" y="522" text-anchor="middle" class="small">files and extraction</text>
  <rect x="481" y="464" width="216" height="78" rx="8" class="box"/><text x="589" y="496" text-anchor="middle" class="label">Research</text><text x="589" y="522" text-anchor="middle" class="small">sources and synthesis</text>
  <rect x="717" y="464" width="216" height="78" rx="8" class="box"/><text x="825" y="496" text-anchor="middle" class="label">Markets</text><text x="825" y="522" text-anchor="middle" class="small">read-only data</text>
  <rect x="953" y="464" width="216" height="78" rx="8" class="box"/><text x="1061" y="496" text-anchor="middle" class="label">Work services</text><text x="1061" y="522" text-anchor="middle" class="small">mail, chat, projects</text>
  <rect x="1189" y="464" width="196" height="78" rx="8" class="box"/><text x="1287" y="496" text-anchor="middle" class="label">Automations</text><text x="1287" y="522" text-anchor="middle" class="small">scheduled work</text>

  <text x="80" y="650" class="layer">CONTINUITY</text>
  <rect x="245" y="612" width="270" height="78" rx="8" class="box2"/><text x="380" y="644" text-anchor="middle" class="label">Workspace state</text><text x="380" y="670" text-anchor="middle" class="small">current task and context</text>
  <rect x="535" y="612" width="270" height="78" rx="8" class="box2"/><text x="670" y="644" text-anchor="middle" class="label">Memory</text><text x="670" y="670" text-anchor="middle" class="small">reusable account context</text>
  <rect x="825" y="612" width="270" height="78" rx="8" class="box2"/><text x="960" y="644" text-anchor="middle" class="label">Artifacts</text><text x="960" y="670" text-anchor="middle" class="small">saved work products</text>
  <rect x="1115" y="612" width="270" height="78" rx="8" class="box2"/><text x="1250" y="644" text-anchor="middle" class="label">Execution history</text><text x="1250" y="670" text-anchor="middle" class="small">reviewable outcomes</text>

  <g stroke="#72e6b1" stroke-width="2" opacity=".5"><path d="M190 268H1430"/><path d="M190 416H1430"/><path d="M190 564H1430"/></g>
  <text x="80" y="820" class="foot">Public-safe view. Internal hosts, credentials, provider topology, and private source are intentionally excluded.</text>
</svg>
