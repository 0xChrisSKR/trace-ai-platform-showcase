<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">TRACE runtime flow</title>
  <desc id="desc">A bounded workflow that resolves access, executes work, saves results, and exposes blockers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07100f"/><stop offset="1" stop-color="#0a1720"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#72e6b1"/></marker>
    <style>.title{font:700 48px Arial,sans-serif;fill:#f4fbf8}.sub{font:400 22px Arial,sans-serif;fill:#9fb3ac}.label{font:700 21px Arial,sans-serif;fill:#f4fbf8}.small{font:400 15px Arial,sans-serif;fill:#9fb3ac}.tag{font:700 15px Arial,sans-serif;fill:#72e6b1}.card{fill:#101d1a;stroke:#304b43;stroke-width:2}.warn{fill:#211b10;stroke:#a97832;stroke-width:2}</style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="80" y="88" class="title">Bounded Runtime Flow</text><text x="80" y="130" class="sub">The system either completes a reviewable step or reports exactly what is missing</text>
  <g stroke="#72e6b1" stroke-width="3" fill="none" marker-end="url(#arrow)"><path d="M315 292H375"/><path d="M635 292H695"/><path d="M955 292H1015"/><path d="M1275 292H1335"/></g>
  <rect x="80" y="220" width="235" height="144" rx="8" class="card"/><text x="110" y="264" class="tag">INPUT</text><text x="110" y="302" class="label">User goal</text><text x="110" y="330" class="small">message, file, or follow-up</text>
  <rect x="375" y="220" width="260" height="144" rx="8" class="card"/><text x="405" y="264" class="tag">PLAN</text><text x="405" y="302" class="label">Clarify and select</text><text x="405" y="330" class="small">a bounded work path</text>
  <rect x="695" y="220" width="260" height="144" rx="8" class="card"/><text x="725" y="264" class="tag">RESOLVE</text><text x="725" y="302" class="label">Account and access</text><text x="725" y="330" class="small">App, connection, permission</text>
  <rect x="1015" y="220" width="260" height="144" rx="8" class="card"/><text x="1045" y="264" class="tag">EXECUTE</text><text x="1045" y="302" class="label">Run one task graph</text><text x="1045" y="330" class="small">through a verified adapter</text>
  <rect x="1335" y="220" width="185" height="144" rx="8" class="card"/><text x="1365" y="264" class="tag">RETURN</text><text x="1365" y="302" class="label">Result</text><text x="1365" y="330" class="small">back to Chat</text>
  <path d="M825 364V490" stroke="#dca754" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <rect x="590" y="500" width="470" height="126" rx="8" class="warn"/><text x="625" y="545" fill="#f0c878" class="label" font-size="18">Connection, approval, or provider missing</text><text x="625" y="578" class="small">Stop and show one concrete next step.</text><text x="625" y="602" class="small">Do not report success.</text>
  <path d="M1427 364V680H1120" stroke="#72e6b1" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <rect x="760" y="650" width="360" height="112" rx="8" class="card"/><text x="795" y="694" class="label">Save continuity</text><text x="795" y="724" class="small">Workspace + Memory + Artifact + History</text>
  <path d="M760 706H300V364" stroke="#72e6b1" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <text x="80" y="834" class="small">High-consequence actions remain behind explicit approval and outside the current public completion claim.</text>
</svg>
